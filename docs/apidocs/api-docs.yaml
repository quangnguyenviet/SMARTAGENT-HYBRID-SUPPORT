openapi: 3.0.1
info:
  title: OpenAPI definition
  version: v0
servers:
- url: http://localhost:8080
  description: Generated server url
paths:
  /api/conversations/{id}/close:
    put:
      tags:
      - chat-controller
      operationId: closeConversation
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
  /api/conversations:
    get:
      tags:
      - chat-controller
      operationId: getAllConversations
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListConversationDTO"
    post:
      tags:
      - chat-controller
      operationId: createConversation
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseConversationDTO"
  /api/conversations/{id}/takeover:
    post:
      tags:
      - chat-controller
      operationId: takeOver
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TakeOverRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
  /api/conversations/{id}/messages:
    get:
      tags:
      - chat-controller
      operationId: getConversationHistory
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListMessageDTO"
    post:
      tags:
      - chat-controller
      operationId: sendMessage
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseMessageDTO"
  /api/conversations/{id}/status:
    patch:
      tags:
      - chat-controller
      operationId: updateConversationStatus
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: status
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
  /api/conversations/{id}:
    get:
      tags:
      - chat-controller
      operationId: getConversation
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseConversationDTO"
    delete:
      tags:
      - chat-controller
      operationId: deleteConversation
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
  /api/conversations/{id}/messages/recent:
    get:
      tags:
      - chat-controller
      operationId: getRecentMessages
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 10
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListMessageDTO"
  /api/conversations/customer/{customerId}:
    get:
      tags:
      - chat-controller
      operationId: getConversationsByCustomer
      parameters:
      - name: customerId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListConversationDTO"
components:
  schemas:
    ApiResponseVoid:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
        timestamp:
          type: integer
          format: int64
    CreateConversationRequest:
      type: object
      properties:
        customerId:
          type: integer
          format: int64
        channel:
          type: string
    ApiResponseConversationDTO:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: "#/components/schemas/ConversationDTO"
        timestamp:
          type: integer
          format: int64
    ConversationDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        customerId:
          type: integer
          format: int64
        channel:
          type: string
        status:
          type: string
        isBotActive:
          type: boolean
        leadScore:
          type: integer
          format: int32
        intentSummary:
          type: string
        sentiment:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastMessageTime:
          type: string
          format: date-time
        messageCount:
          type: integer
          format: int64
    TakeOverRequest:
      type: object
      properties:
        agentId:
          type: integer
          format: int64
    SendMessageRequest:
      type: object
      properties:
        sender:
          type: string
        senderType:
          type: string
        content:
          type: string
    ApiResponseMessageDTO:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: "#/components/schemas/MessageDTO"
        timestamp:
          type: integer
          format: int64
    MessageDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        conversationId:
          type: integer
          format: int64
        sender:
          type: string
        senderType:
          type: string
        content:
          type: string
        timestamp:
          type: string
          format: date-time
    ApiResponseListConversationDTO:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: array
          items:
            $ref: "#/components/schemas/ConversationDTO"
        timestamp:
          type: integer
          format: int64
    ApiResponseListMessageDTO:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: array
          items:
            $ref: "#/components/schemas/MessageDTO"
        timestamp:
          type: integer
          format: int64
